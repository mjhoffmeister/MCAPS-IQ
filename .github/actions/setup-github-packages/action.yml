name: Setup GitHub Packages Auth
description: >
  Writes a per-project .npmrc that authenticates to GitHub Packages for
  private @microsoft and @jinlee794 scoped packages, while keeping
  @microsoft/workiq on the public npm registry.

inputs:
  token:
    description: >
      A GitHub PAT (classic) with `read:packages` scope, or fine-grained
      token with "Read access to packages" on the microsoft and jinlee794 orgs.
    required: true

runs:
  using: composite
  steps:
    - name: Write .npmrc for GitHub Packages
      shell: bash
      env:
        GH_PACKAGES_TOKEN: ${{ inputs.token }}
      run: |
        # ── Auth token for GitHub Packages registry ──
        # This lets npm/npx fetch private packages from npm.pkg.github.com.
        #
        # IMPORTANT: We do NOT set a blanket @microsoft:registry redirect
        # because @microsoft/workiq lives on public npmjs, not GitHub Packages.
        # Instead, the mcp.json entries use per-invocation env vars
        # (npm_config_@microsoft:registry) to route only the private packages.
        # For CI validation, we use explicit --registry flags.

        NPMRC_PATH="${GITHUB_WORKSPACE}/.npmrc"

        cat > "$NPMRC_PATH" <<EOF
        # Auto-generated by .github/actions/setup-github-packages
        # Authenticates to GitHub Packages for private package resolution.
        # Scoped registries for private packages only:
        @jinlee794:registry=https://npm.pkg.github.com
        //npm.pkg.github.com/:_authToken=${GH_PACKAGES_TOKEN}
        EOF

        # Strip leading whitespace from heredoc indentation
        sed -i.bak 's/^        //' "$NPMRC_PATH" && rm -f "${NPMRC_PATH}.bak"

        echo "✔ Wrote $(wc -l < "$NPMRC_PATH" | tr -d ' ') lines to $NPMRC_PATH"

    - name: Verify auth token is valid
      shell: bash
      run: |
        # Quick smoke test — try to reach the GitHub Packages registry
        if npm ping --registry https://npm.pkg.github.com 2>/dev/null; then
          echo "✔ GitHub Packages registry is reachable"
        else
          echo "⚠ GitHub Packages ping failed — token may be invalid or expired"
          echo "  Ensure the secret has read:packages scope"
          exit 1
        fi
